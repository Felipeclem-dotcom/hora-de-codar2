<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //Escreva um programa que calcule a média de quatro números informados pelo usuário, mas somente se esses números forem maiores que 0 e menores que 10. No final, se a média for maior que cinco o usuário receberá uma mensagem "Você passou no teste". Em qualquer outra situação, ele receberá uma mensagem de "tente novamente"

       var num1 = parseInt(prompt("Digite o 1° número: "));
       while (num1 > 10 || num1 < 0) {
        num1 = parseInt(prompt("Digite o 1° número novamente!: "));
       }
       
       var num2 = parseInt(prompt("Digite o 2° número: "));
       while (num2 > 10 || num2 < 0) {
        num2 = parseInt(prompt("Digite o 2° número novamente!: "));
       }

       var num3 = parseInt(prompt("Digite o 3° número: "));
       while (num3 > 10 || num3 < 0) {
        num3 = parseInt(prompt("Digite o 3° número novamente!: "));
       }

       var num4 = parseInt(prompt("Digite o 4° número: "));
       while (num4 > 10 || num4 < 0) {
        num4 = parseInt(prompt("Digite o 4° número novamente!: "));
       }

       var soma = num1 + num2 + num3 + num4

       if (soma / 4 >= 5){
        alert("Você passou no teste")
       }

       else {
        alert("Tente novamente")
       }

    </script>
</head>

</body>
</html>
