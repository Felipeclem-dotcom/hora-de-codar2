    <script>
        //Faça um programa que receba quatro valores informados pelo usuário, mas informe somente o primeiro, o último e o maior de todos eles (considere que todos os números informados serão diferentes)

       var num1 = parseInt(prompt("Digite o 1° número"));
       var num2 = parseInt(prompt("Digite o 2° número"));
       var num3 = parseInt(prompt("Digite o 3° número"));
       var num4 = parseInt(prompt("Digite o 4° número"));

       var nUM1 = num1
       var nUM2 = num2
       var nUM3 = num3
       var nUM4 = num4

       if (num1 < num2 || num1 < num3 || num1 < num4) {
        num1 = 0
       }
       if (num2 < num3 || num2 < num1 || num2 < num4) {
        num2 = 0
       }
       if (num3 < num2 || num3 < num1 || num3 < num4) {
        num3 = 0
       }
       if (num4 < num2 || num4 < num3 || num4 < num1) {
        num4 = 0
       }

       alert("O primeiro número foi: " + nUM1 + ", o último número foi: " + nUM4 + ". O maior número é o: " + (num1 + num2 + num3 + num4))

    </script>
