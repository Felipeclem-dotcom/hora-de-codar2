<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
       //Escreva um programa para ler 2 valores inteiros informados pelo usuário e uma das seguintes operações a serem executadas (codificada da seguinte forma: 1. Adição, 2. Subtração, 3. Divisão, 4. Multiplicação).
       //O programa deve calcular e escrever o resultado dessa operação sobre os dois valores lidos. 
        //Observação: Considere que só serão lidos os valores 1, 2, 3 ou 4 para as operações

       var num1 = parseInt(prompt("Digite o 1° número"));
       var num2 = parseInt(prompt("Digite o 2° número"));
       var escolha= prompt("1. Adição \n2. Subtração \n3. Divisão \n4. Multiplicação");

       if (escolha == "1"){
        alert(num1 + num2);
       }
       if (escolha == "2"){
        alert(num1 - num2);
       }
       if (escolha == "3"){
        alert(num1 / num2);
       }
       if (escolha == "4"){
        alert(num1 * num2);
       }

    </script>
</head>

</body>
</html>
